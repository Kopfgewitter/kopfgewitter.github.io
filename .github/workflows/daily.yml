name: Taegliches Kopfgewitter Video

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  create-and-post:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: FFmpeg installieren
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg fonts-liberation

      - name: Python-Pakete installieren
        run: pip install -r requirements.txt

      - name: Video erstellen und posten
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          ELEVENLABS_VOICE_ID: ${{ secrets.ELEVENLABS_VOICE_ID }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          TIKTOK_ACCESS_TOKEN: ${{ secrets.TIKTOK_ACCESS_TOKEN }}
          WATERMARK_TEXT: "Kopfgewitter"
        run: python main.py

      - name: Output speichern
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: video-output-${{ github.run_number }}
          path: output/
          retention-days: 7
