name: Taegliches Kopfgewitter Video
on:
  schedule:
    - cron: '0 5 * * *'   # 07:00 CEST – Morgens
    - cron: '0 10 * * *'  # 12:00 CEST – Mittagspause
    - cron: '0 18 * * *'  # 20:00 CEST – Abend (stärkster Slot)
  workflow_dispatch:
jobs:
  create-and-post:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Code auschecken
        uses: actions/checkout@v4
      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: FFmpeg installieren
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg fonts-liberation
      - name: Python-Pakete installieren
        run: pip install -r requirements.txt
      - name: Video erstellen und posten
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          ELEVENLABS_VOICE_ID: ${{ secrets.ELEVENLABS_VOICE_ID }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_ACCOUNT_ID: ${{ secrets.INSTAGRAM_ACCOUNT_ID }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          WATERMARK_TEXT: "Kopfgewitter"
        run: python main.py
        continue-on-error: true
      - name: Output speichern
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: video-output-${{ github.run_number }}
          path: output/
          retention-days: 7
      - name: Cache speichern
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add used_videos.json || true
          git diff --staged --quiet || git commit -m "Update video cache [skip ci]"
          git push || true
